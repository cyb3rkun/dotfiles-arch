# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Animations Configuration                 ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# https://wiki.hyprland.org/Configuring/Animations/

animations {
	enabled = yes

	#	   Name            X0,   Y0    X1    Y1
	bezier = easeOutQuint,   0.23, 1,    0.32, 1
	bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
	bezier = linear,         0,    0,    1,    1
	bezier = almostLinear,   0.5,  0.5,  0.75, 1
	bezier = quick,          0.15, 0,    0.1,  1

	animation = windowsIn, 1, 2, easeInOutCubic, slide
	animation = windowsOut, 1, 2, easeInOutCubic, slide 
	animation = workspacesIn, 1, 2, easeOutQuint, slide
	animation = workspacesOut, 1, 2, easeInOutCubic, slidefade 80%
	animation = windowsMove, 1, 2, easeInOutCubic, slidefade 80%
}
